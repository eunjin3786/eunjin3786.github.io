<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Dark Mode</title>
    <style>
      :root {
        color-scheme: light dark;
        --h1-color: red;
        --h2-color: red;
      }
      
      /* 다크모드 컬러 셋 */
      @media screen and (prefers-color-scheme: dark) {
        :root {
          --h1-color: green;
          --h2-color: green;
        }

      h1 {
        font-size: 1000%;
        color: var(--h1-color);
      }
      
      h2 {
        font-size: 500%;
        color: var(--h2-color);
      }
    </style>
  </head>
  <body>
    <h1> 안녕하세요 </h1>
    <h2> 다크모드 테스트 입니다 😜 </h2>
  </body>
</html>
